global:
  scrape_interval: 15s

scrape_configs:
  - job_name: "traefik"
    metrics_path: /metrics
    static_configs:
      - targets: ["172.17.0.1:8082"]

  - job_name: "node"
    static_configs:
      - targets: ["172.17.0.1:9100"]

  - job_name: "redis"
    static_configs:
      - targets: ["172.17.0.1:9121"]

  - job_name: "postgres"
    static_configs:
      - targets: ["172.17.0.1:9187"]
